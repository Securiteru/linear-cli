version: 2

builds:
  - main: .
    binary: linear
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: Securiteru
      name: homebrew-tap
    homepage: https://github.com/Securiteru/linear-cli
    description: Fast CLI for Linear via GraphQL API
